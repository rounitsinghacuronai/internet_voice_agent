source: "Syncbroad Networks Digital Guide 2026-07"
version: "2026-07"
language: en
sections:
  - title: Syncbroad Networks app
    keywords: [app, self care, अॅप, ऐप, download]
    text: >
      The Syncbroad Networks app (Android/iOS) shows live usage, bills, recharge, plan
      change, ticket tracking, Wi-Fi settings for fiber (SSID/password/guest
      network), and store locations. Login via OTP on the registered mobile.
  - title: Missed-call and SMS services
    keywords: [ussd, missed call, sms code, बॅलन्स चेक]
    text: >
      Balance and validity: dial *121#. Own number: *99#. Data balance: SMS DATA to
      121. Bill amount: SMS BILL to 121. DND: SMS START 0 to 1909. These are free.
  - title: Store locator and doorstep service
    keywords: [store, दुकान, doorstep, kyc visit]
    text: >
      Stores operate 10 AM to 8 PM daily. SIM replacement, KYC, MNP and eSIM QR
      needs can also be done by doorstep visit (Rs 99, free on plans 999+) booked
      on this call or in the app.
