id: call_scripts
title: Official call scripts and communication guidelines
category: general
kind: script
source: "Training Manual pp.16-18"
version: "2026-07"
language: mixed
sections:
  - title: Official opening, hold and closing lines
    keywords: [script, greeting, closing, opening]
    text: >
      Opening - Marathi: "नमस्कार महावितरण, मी (नाव) आपली कशा प्रकारे मदत करू शकते?"
      Hindi: "नमस्कार महावितरण, मैं (नाम) आपकी किस प्रकार सहायता कर सकती हूँ?"
      English: "Good morning/afternoon/evening, Mahavitaran, myself (name), how may I help you?"
      Hold - ask permission for a 30-second hold and thank the caller on release.
      Closing - Marathi: "महावितरणमध्ये संपर्क केल्याबद्दल धन्यवाद. आपला दिवस शुभ असो."
      Hindi: "महावितरण में संपर्क करने के लिए धन्यवाद. आपका दिन शुभ रहे."
      English: "Thank you for calling Mahavitaran. Have a nice day."
      No response - repeat the prompt up to 3 times, then politely disconnect.
