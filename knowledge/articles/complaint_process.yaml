id: complaint_process
title: Ticket lifecycle, SLAs and escalation matrix
category: complaints
kind: sop
source: "Syncbroad Networks CC Playbook 2026-07"
version: "2026-07"
language: en
sections:
  - title: Ticket lifecycle
    keywords: [ticket, complaint, status, तक्रार, शिकायत, टिकट]
    text: >
      Every ticket gets a number starting with TC, sent by SMS. States: REGISTERED →
      IN PROGRESS → RESOLVED (with customer confirmation) or ESCALATED. Tickets
      auto-escalate to level two when the L1 SLA lapses, and to level three at L2
      lapse. A ticket is closed only after the customer confirms resolution — on
      this call or via the SMS confirmation link.
  - title: Key SLA hours
    keywords: [sla, resolution time, कितने घंटे, समय]
    text: >
      Highest-priority: SIM block and fraud incidents — immediate. Enterprise leased
      line down — 2 hours. Recharge failed — 4 hours. Broadband no-internet — 8
      hours. Fiber cut — 8 hours. Mobile no-network / data — 24 hours. Slow speed /
      disconnections / router faults — 24 hours. Billing disputes — 72 hours.
      Failed-but-debited payments — 5 to 7 working days (bank reversal).
  - title: Engineer visits
    keywords: [engineer, visit, technician, इंजीनियर, टेक्निशियन]
    text: >
      Engineer visits are booked in 3-hour slots, 8 AM to 8 PM, all seven days. The
      engineer calls the registered mobile 30 minutes before arrival. Missed-slot
      complaints escalate the parent ticket automatically. Visits are free for
      network-side faults; customer-equipment repairs are chargeable with consent.
  - title: Escalation levels
    keywords: [escalate, senior, appellate, वरिष्ठ]
    text: >
      Level 1: this desk. Level 2: senior engineer / billing review (auto or agent
      escalation). Level 3: circle nodal officer — 3 working days. Beyond that, the
      appellate authority (30 days) per TRAI's complaint-redressal framework. Give
      nodal/appellate contact details only when the caller asks or L2 has failed.
