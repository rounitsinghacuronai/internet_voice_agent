id: outage_info
title: Outages and load shedding information
category: complaints
kind: article
source: "Training Manual pp.77-79"
version: "2026-07"
language: en
sections:
  - title: Outage categories
    keywords: [outage, power cut, लाईट गेली, बिजली गई, load shedding]
    text: >
      A power failure affecting a whole locality is registered as Supply Failed - Total
      Area (standard restoration 11 hours); an outage only at the caller's premises is
      Supply Failed - Phase out (8 hours). Planned maintenance and feeder outage
      information, and any emergency load-shedding schedule, are published on the
      Mahavitaran website consumer section. Power-failure complaints can also be lodged
      by missed call or SMS from the registered mobile.
