id: contact_offices
title: Helplines, offices and organisation
category: general
kind: article
source: "Training Manual pp.13-15,80-85"
version: "2026-07"
language: en
sections:
  - title: Helpline numbers
    keywords: [helpline, toll free, "1912", फोन नंबर]
    text: >
      Round-the-clock toll-free helplines - 1912 and 19120 (national short codes),
      1800-233-3435 and 1800-102-3435. The Centralized Customer Care Centres at Bhandup
      and Pune operate 24x7x365.
  - title: Field office hierarchy
    keywords: [office, sub division, कार्यालय, SDO]
    text: >
      Consumer-facing structure - Section office (local technicians), Sub-Division Office
      (SDO - billing corrections, name changes, complaints), Division (Executive
      Engineer), Circle (Superintending Engineer), Zone (Chief Engineer) and four Regions
      (Kalyan/Kokan, Pune, Nagpur, Aurangabad). Billing adjustments happen only at the
      Sub-Division Office.
  - title: HT consumer grievances
    keywords: [HT, high tension, grievance]
    text: >
      HT consumers register power and billing complaints through the dedicated online HT
      Grievance Redressal System on the Mahavitaran website, with escalation to the field
      hierarchy.
