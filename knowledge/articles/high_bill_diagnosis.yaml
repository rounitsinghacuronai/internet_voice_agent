id: high_bill_diagnosis
title: High or incorrect bill - diagnosis before complaint
category: billing
kind: decision_tree
source: "Syncbroad Networks CC Playbook 2026-07"
version: "2026-07"
language: en
sections:
  - title: High bill diagnosis order
    keywords: [high bill, zyada bill, बिल जास्त, ज्यादा बिल, incorrect bill]
    text: >
      Before registering a billing complaint, check in order: (1) plan rent change
      or promotional discount that ended this cycle; (2) one-time charges — add-on
      data packs, international roaming, premium SMS; (3) pro-rated charges after a
      mid-cycle plan change; (4) GST on all of the above. Explain the largest line
      item first. Only register "Billing - High Bill" if a charge looks genuinely
      wrong; the billing review team responds within 72 hours and any agreed
      adjustment appears in the next invoice.
  - title: Charges the agent must never promise to waive
    keywords: [waiver, discount, adjustment, माफ]
    text: >
      Frontline agents never promise waivers, refunds or goodwill credits. Only the
      billing review team can adjust an invoice after reviewing the ticket. Wording:
      "I've registered this for review — if the charge is found incorrect, it will be
      adjusted in your next bill."
