id: billing_rules
title: Billing rules, discounts and charges
category: billing
kind: policy
source: "CCCC Training Manual pp.64-71"
version: "2026-07"
language: en
sections:
  - title: Prompt payment discount
    keywords: [discount, prompt, early payment, सूट, छूट]
    text: >
      A prompt payment discount of 1% on the monthly bill (excluding taxes and duties)
      applies if the bill is paid within 7 days from the date of issue, or within 5 days
      of receipt of the bill, whichever is later.
  - title: Digital payment discount
    keywords: [online payment, UPI, digital, discount]
    text: >
      LT consumers get a 0.25% discount on the monthly bill (excluding taxes and duties),
      capped at Rs 500, for paying through digital modes — credit/debit card, UPI, BHIM,
      internet banking, mobile banking or wallets.
  - title: Delayed payment charges
    keywords: [late fee, DPC, due date, penalty, विलंब]
    text: >
      If the bill is not paid by the due date, delayed payment charges of 1.25% of the
      total bill (including taxes and duties) are levied. If part payment is made within
      the due date, the charge applies only to the unpaid portion.
  - title: Interest on arrears
    keywords: [interest, arrears, थकबाकी, ब्याज]
    text: >
      Interest on arrears per annum - payment made after 60 days and before 90 days from
      billing date is 12%; after 90 days and up to 180 days is 15%; after 180 days is 18%.
  - title: Fuel Adjustment Cost (FAC)
    keywords: [FAC, fuel adjustment, इंधन समायोजन]
    text: >
      FAC is charged monthly on all consumer categories in proportion to the variable
      charges of each category and slab. It reflects variations in fuel and power-purchase
      cost per the Commission-approved formula. Monthly FAC details are published at
      www.mahadiscom.in.
  - title: Security deposit
    keywords: [security deposit, अनामत]
    text: >
      Security deposit equals the average of three months of billing (or the billing-cycle
      period, whichever is lesser). MSEDCL pays interest on cash security deposits of Rs 50
      or more at the RBI bank rate, from the date of deposit until refund dispatch.
  - title: Power factor incentive and penalty
    keywords: [power factor, PF, incentive, penalty]
    text: >
      Average power factor above 0.95 lag up to 1.0 earns an incentive of 0.5% to 3.5% of
      the monthly bill. Average power factor below 0.9 attracts penal charges of 1% to 5%.
      Applies to energy, reliability, FAC and fixed/demand charges, excluding taxes.
