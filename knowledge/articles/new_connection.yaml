id: new_connection
title: New connection, change of name, load change
category: connections
kind: article
source: "Training Manual p.39"
version: "2026-07"
language: en
sections:
  - title: Applying for a new connection
    keywords: [new connection, नवीन कनेक्शन, नया कनेक्शन, A-1, D-1]
    text: >
      To apply for a new connection, submit the A-1 application form for the purpose
      (residential, commercial, industrial or agricultural) along with the D-1 electrical
      contractor test report, or apply online through Web Self Service on mahadiscom.in.
      Standard processing time is 720 hours. Application status can be checked with the
      application number - no verification needed.
  - title: Change of name
    keywords: [name change, नाव बदल, नाम बदलना, U form]
    text: >
      Change of name on an electricity connection uses the U-Form with ownership proof
      (sale deed, index-2, heirship documents), submitted at the Sub-Division Office or
      through the mobile app. Standard processing is 1440 hours (60 days).
  - title: Load extension or reduction
    keywords: [load change, लोड, extension, reduction]
    text: >
      Consumers can apply for addition or reduction of sanctioned load through the mobile
      app or Sub-Division Office. Standard processing is 1440 hours. The change is
      confirmed with an OTP on the registered mobile.
