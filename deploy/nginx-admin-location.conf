# Reference snippet — the admin dashboard location proxied to the Next.js
# service on 127.0.0.1:3100. deploy/deploy_dashboard.sh installs this as
# /etc/nginx/snippets/syncbroad-admin.conf and wires it into the existing
# internet.acuronai.com :443 server block. Shown here for review.
#
# Result: https://internet.acuronai.com/admin  ->  Next.js (systemd) :3100
#         https://internet.acuronai.com/api/... ->  FastAPI backend (unchanged)

location /admin {
    proxy_pass         http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
