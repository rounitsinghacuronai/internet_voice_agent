<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syncbroad Networks · Ops Tickets</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cpath d='M28 13c0-4-4.3-6.2-9-6.2S10 9 10 13.2C10 21 28 17.6 28 25.8c0 4.2-4.3 6.4-9 6.4s-8.9-2.1-9.5-6.4' fill='none' stroke='%233BB4E8' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root{--bg:#0a1220;--panel:#111c30;--panel2:#182642;--txt:#e9eef8;--dim:#8fa0bd;
--accent:#00c2a8;--accent2:#3d8bfd;--ok:#2ea86b;--err:#e5534b;--warn:#e8a13c;
font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);min-height:100vh}
header{display:flex;align-items:center;gap:14px;padding:14px 22px;background:var(--panel);
border-bottom:1px solid #22314f}
.logo{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
display:grid;place-items:center;font-weight:800;color:#04121c;font-size:19px}
header h1{font-size:17px;font-weight:600}header .sub{font-size:12px;color:var(--dim)}
header a{margin-left:auto;color:var(--accent2);font-size:13px;text-decoration:none}
.bar{display:flex;gap:10px;padding:14px 22px;max-width:1300px;margin:0 auto;width:100%}
#q{flex:1;background:var(--panel2);border:1px solid #2a3b63;border-radius:10px;color:var(--txt);
padding:11px 14px;font-size:14px;outline:none}
#q:focus{border-color:var(--accent2)}
.count{align-self:center;color:var(--dim);font-size:13px;white-space:nowrap}
main{max-width:1300px;margin:0 auto;padding:0 22px 30px}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid #22314f;
border-radius:12px;overflow:hidden;font-size:13.5px}
th{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);
text-align:left;padding:10px 12px;border-bottom:1px solid #22314f;background:var(--panel2)}
td{padding:10px 12px;border-bottom:1px solid #1b2743;vertical-align:top}
tr:hover td{background:#15213a}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-SENT{background:#0f3a2a;color:#4cd98a}.b-PENDING{background:#33301a;color:#e8d13c}
.b-RETRYING{background:#3a2c14;color:#e8a13c}.b-FAILED{background:#3a1a1a;color:#ff9d94}
.p-HIGH{color:#ff9d94;font-weight:700}.p-MEDIUM{color:#e8a13c}.p-LOW{color:var(--dim)}
.sum{max-width:420px;color:var(--dim);line-height:1.4;cursor:pointer}
.sum.open{white-space:pre-wrap;color:var(--txt)}
.sum:not(.open){display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tid{color:var(--accent);font-weight:600;white-space:nowrap}
.mono{font-family:ui-monospace,monospace;font-size:12.5px;color:var(--dim)}
.empty{padding:40px;text-align:center;color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="logo" style="background:#fff;padding:5px;display:flex;align-items:center;justify-content:center">
    <svg viewBox="0 0 40 40" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="sb" x1="8" y1="7" x2="30" y2="33" gradientUnits="userSpaceOnUse"><stop stop-color="#3BB4E8"/><stop offset="1" stop-color="#1E88C7"/></linearGradient></defs>
      <path d="M28 13c0-4-4.3-6.2-9-6.2S10 9 10 13.2C10 21 28 17.6 28 25.8c0 4.2-4.3 6.4-9 6.4s-8.9-2.1-9.5-6.4" stroke="url(#sb)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div><h1>Operations Tickets</h1><div class="sub">WhatsApp notifications · AI Voice Agent</div></div>
  <a href="/">← Live Call Console</a>
</header>
<div class="bar">
  <input id="q" placeholder="Search ticket, customer, mobile, category, priority, status…">
  <span class="count" id="count">—</span>
</div>
<main>
  <table>
    <thead><tr>
      <th>Ticket</th><th>Customer</th><th>Category</th><th>Priority</th>
      <th>WhatsApp</th><th>Delivered</th><th>Follow-ups</th><th>Summary</th><th>Call</th>
    </tr></thead>
    <tbody id="rows"><tr><td colspan="9" class="empty">Loading…</td></tr></tbody>
  </table>
</main>
<script>
const $=id=>document.getElementById(id);
let t=null;
async function load(){
  const q=$('q').value.trim();
  const r=await fetch('/tickets?q='+encodeURIComponent(q));
  const data=(await r.json()).tickets||[];
  $('count').textContent=data.length+' ticket'+(data.length===1?'':'s');
  if(!data.length){$('rows').innerHTML='<tr><td colspan="9" class="empty">No tickets yet — they appear the moment the agent registers a complaint, books an engineer, blocks a SIM, or escalates.</td></tr>';return;}
  $('rows').innerHTML=data.map(x=>`<tr>
    <td><span class="tid">${x.ticket_id}</span><br><span class="mono">${x.complaint_no||''}</span><br><span class="mono">${(x.created_at||'').replace('T',' ').slice(0,16)}</span></td>
    <td>${x.customer_name||'—'}<br><span class="mono">${x.mobile||''}</span><br><span class="mono">${x.account_no||''}</span></td>
    <td>${x.category||''}<br><span class="mono">${x.service_type||''} · ${x.location||''}</span></td>
    <td class="p-${x.priority}">${x.priority}</td>
    <td><span class="badge b-${x.status}">${x.status}</span>${x.attempts>1?`<br><span class="mono">${x.attempts} attempts</span>`:''}${x.last_error?`<br><span class="mono" title="${x.last_error}">⚠ error</span>`:''}</td>
    <td class="mono">${x.delivered_at?x.delivered_at.replace('T',' ').slice(5,16):'—'}</td>
    <td>${x.follow_up_count||0}</td>
    <td><div class="sum" onclick="this.classList.toggle('open')">${(x.summary||'').replace(/</g,'&lt;')}</div></td>
    <td class="mono">${x.call_id||'—'}</td>
  </tr>`).join('');
}
$('q').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(load,250);});
load();setInterval(load,10000);
</script>
</body>
</html>
